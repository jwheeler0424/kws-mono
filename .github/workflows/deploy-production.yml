name: Deploy Production

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kyleweberseattle.com
  MLS_IMAGE_NAME: ${{ github.repository_owner }}/kyleweberseattle.com-mls
  DB_IMAGE_NAME: ${{ github.repository_owner }}/kyleweberseattle.com-db

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prebuild web app
        run: bunx turbo run build --filter=web...

      - name: Build production app image via docker compose
        env:
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          SKIP_WEB_BUILD: "1"
        run: docker compose -f docker-compose.ci.yml build app

      - name: Push production app image to GHCR
        env:
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: docker push "$APP_IMAGE"

      - name: Build production MLS image via docker compose
        env:
          MLS_IMAGE: ${{ env.REGISTRY }}/${{ env.MLS_IMAGE_NAME }}:latest
          SKIP_MLS_BUILD: "1"
        run: docker compose -f docker-compose.ci.yml build mls

      - name: Push production MLS image to GHCR
        env:
          MLS_IMAGE: ${{ env.REGISTRY }}/${{ env.MLS_IMAGE_NAME }}:latest
        run: docker push "$MLS_IMAGE"

      - name: Build production DB image
        env:
          DB_IMAGE: ${{ env.REGISTRY }}/${{ env.DB_IMAGE_NAME }}:latest
        run: docker compose -f docker-compose.ci.yml build db

      - name: Push production DB image to GHCR
        env:
          DB_IMAGE: ${{ env.REGISTRY }}/${{ env.DB_IMAGE_NAME }}:latest
        run: docker push "$DB_IMAGE"

  deploy-to-vps:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /apps/kyleweberseattle.com
            echo "${{ secrets.REPO_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            chmod +x scripts/prod-deploy.sh
            ./scripts/prod-deploy.sh
