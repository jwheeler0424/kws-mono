name: kws

services:
  db:
    image: ${DB_IMAGE:-ghcr.io/placeholder/db:ci}
    build:
      context: .
      dockerfile: Dockerfile
      target: db

  app:
    image: ${APP_IMAGE:-ghcr.io/placeholder/app:ci}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        SKIP_WEB_BUILD: ${SKIP_WEB_BUILD:-0}

  mls:
    image: ${MLS_IMAGE:-ghcr.io/placeholder/mls:ci}
    build:
      context: .
      dockerfile: apps/mls/Dockerfile
      args:
        SKIP_MLS_BUILD: ${SKIP_MLS_BUILD:-1}

  redis:
    image: ${REDIS_IMAGE:-ghcr.io/placeholder/redis:ci}
    build:
      context: .
      dockerfile: docker/redis/Dockerfile

  nginx:
    image: ${NGINX_IMAGE:-ghcr.io/placeholder/nginx:ci}
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
