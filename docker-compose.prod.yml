name: ${COMPOSE_PROJECT_NAME:-kw-seattle}

services:
  db:
    image: ${DB_IMAGE:-ghcr.io/jwheeler0424/kyleweberseattle.com-db:latest}
    env_file:
      - ./packages/config/.env
    command:
      - postgres
      - -c
      - wal_level=${PG_WAL_LEVEL:-logical}
      - -c
      - max_replication_slots=${PG_MAX_REPLICATION_SLOTS:-10}
      - -c
      - max_wal_senders=${PG_MAX_WAL_SENDERS:-10}
    container_name: ${COMPOSE_PROJECT_NAME:-kw-seattle}-db
    restart: unless-stopped
    mem_limit: ${DB_MEMORY_LIMIT:-1g}
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-postgres}
    volumes:
      - pgdata_prod:/var/lib/postgresql
      - ./docker/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: ${REDIS_IMAGE:-redis:alpine}
    env_file:
      - ./packages/config/.env
    container_name: ${COMPOSE_PROJECT_NAME:-kw-seattle}-redis
    restart: unless-stopped
    mem_limit: ${REDIS_MEMORY_LIMIT:-256m}
    command: ['redis-server', '--appendonly', '${REDIS_APPENDONLY:-yes}']
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app_blue:
    image: ${APP_IMAGE:-ghcr.io/jwheeler0424/kyleweberseattle.com:latest}
    pull_policy: always
    env_file:
      - ./packages/config/.env
    container_name: ${COMPOSE_PROJECT_NAME:-kw-seattle}-app-blue
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${APP_PORT:-3443}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:${DB_PORT:-5432}/${DB_NAME:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}
      WEB_MEDIA_SOURCE: /store/media
      WEB_MEDIA_TARGET: /app/apps/web/public/media
    volumes:
      - ${STORE_PATH:-${HOME}/store/kyleweberseattle.com}/media:/store/media
    expose:
      - '${APP_PORT:-3443}'
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://127.0.0.1:${APP_PORT:-3443}/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app_green:
    image: ${APP_IMAGE:-ghcr.io/jwheeler0424/kyleweberseattle.com:latest}
    pull_policy: always
    env_file:
      - ./packages/config/.env
    container_name: ${COMPOSE_PROJECT_NAME:-kw-seattle}-app-green
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${APP_PORT:-3443}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:${DB_PORT:-5432}/${DB_NAME:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}
      WEB_MEDIA_SOURCE: /store/media
      WEB_MEDIA_TARGET: /app/apps/web/public/media
    volumes:
      - ${STORE_PATH:-${HOME}/store/kyleweberseattle.com}/media:/store/media
    expose:
      - '${APP_PORT:-3443}'
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://127.0.0.1:${APP_PORT:-3443}/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mls:
    image: ${MLS_IMAGE:-ghcr.io/jwheeler0424/kyleweberseattle.com-mls:latest}
    pull_policy: always
    env_file:
      - ./packages/config/.env
    container_name: ${COMPOSE_PROJECT_NAME:-kw-seattle}-mls
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_PRETTY: 'false'
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:${DB_PORT:-5432}/${DB_NAME:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}
      MLS_MEDIA_STORE_PATH: /store/media
    volumes:
      - ${STORE_PATH:-${HOME}/store/kyleweberseattle.com}/media:/store/media
      - ${STORE_PATH:-${HOME}/store/kyleweberseattle.com}/data:/store/data

  nginx:
    image: nginx:1.27-alpine
    env_file:
      - ./packages/config/.env
    environment:
      CERTBOT_DOMAIN_FALLBACK: ${CERTBOT_DOMAIN_FALLBACK:-kyleweberseattle.com}
    container_name: ${COMPOSE_PROJECT_NAME:-kw-seattle}-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ${STORE_PATH:-${HOME}/store/kyleweberseattle.com}/media:/store/media:ro
      - ./docker/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./docker/nginx-entrypoint.sh:/usr/local/bin/nginx-entrypoint.sh:ro
    entrypoint: ['sh', '/usr/local/bin/nginx-entrypoint.sh']

  certbot:
    image: certbot/certbot:latest
    env_file:
      - ./packages/config/.env
    environment:
      CERTBOT_DOMAIN_FALLBACK: ${CERTBOT_DOMAIN_FALLBACK:-kyleweberseattle.com}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-admin@kyleweberseattle.com}
    container_name: ${COMPOSE_PROJECT_NAME:-kw-seattle}-certbot
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./docker/certbot-init.sh:/usr/local/bin/certbot-init.sh:ro
    entrypoint: ['sh', '/usr/local/bin/certbot-init.sh']

volumes:
  pgdata_prod:
  redisdata_prod:
  letsencrypt:
  certbot_www:
